<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAD Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&family=Newsreader:ital,wght@0,400;0,500;1,400;1,500;1,600&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html{
  /* desktop reads at sensible size; smaller screens scale down via mobile media queries */
  font-size:16px;
}
@media (min-width: 1600px){ html{font-size:17px} }
@media (min-width: 2000px){ html{font-size:18px} }
@media (min-width: 2600px){ html{font-size:20px} }
html,body{width:100%;height:100%;overflow:hidden}

:root{
  --bg: #000000;
  --accent: #F5F0E1;        /* warm cream — primary text/marks */
  --accent-soft: #B8B0A0;   /* dimmer cream — secondary text */
  --cta: #F8E5B5;           /* warm beige — primary CTA fill */
  --line: rgba(245, 240, 225, 0.16);  /* hairline divider */
  --dur: 0.45s;
}

body{
  font-family:'Hanken Grotesk', system-ui, sans-serif;
  font-weight: 400;
  letter-spacing: -0.01em;
  background:var(--bg);
  color:var(--accent);
  display:grid;
  grid-template-rows:auto 1fr;
  height:100vh;
  transition:background var(--dur) cubic-bezier(.4,0,.2,1), opacity 0.3s ease;
}
body.loading{opacity:0}
body.loading::after{
  content:'LOADING';
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono',monospace;font-weight:700;
  font-size:1.2rem;letter-spacing:0.3em;color:var(--accent);
  opacity:1;pointer-events:auto;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  padding:3rem 4.29rem 0;
}
.logo{
  display:flex;
  align-items:baseline;
  gap:0.6rem;
  color:var(--accent);
  transition:color var(--dur) ease;
}
.logo-svg{
  height:4.95rem;
  width:auto;
  color:var(--accent);
  transition:color var(--dur) ease;
  transform:translateY(0.6rem);
}
.logo-studio{
  font-family:'Newsreader',serif;
  font-style:italic;
  font-weight:400;
  font-size:3.32rem;
  line-height:1;
  color:var(--accent);
  transition:color var(--dur) ease;
}
.header-right{
  text-align:right;
  line-height:1.15;
}
.tagline{
  display:block;
  font-family:'Newsreader',serif;
  font-style:italic;
  font-weight:400;
  font-size:1.85rem;
  color:var(--accent);
  transition:color var(--dur) ease;
  margin-bottom:-0.2rem;
}
.website{
  font-family:'Roboto',sans-serif;
  font-weight:800;
  font-size:1.84rem;
  text-decoration:underline;
  color:var(--accent);
  transition:color var(--dur) ease;
}

/* HERO */
.hero{
  display:flex;
  align-items:center;
  padding:0 4.29rem;
  position:relative;
  overflow:visible;
}
.text-area{
  flex:0 0 60%;
  z-index:2;
}
.headline{
  font-family:'Roboto',sans-serif;
  font-weight:900;
  font-size:18.02rem;
  line-height:0.826;
  letter-spacing:-0.02em;
  text-transform:uppercase;
  color:var(--accent);
  white-space:pre-line;
  margin-bottom:3.7rem;
  transition:color var(--dur) ease, opacity .18s ease;
}
.subtitle{
  font-family:'Roboto',sans-serif;
  font-weight:400;
  font-size:2.9rem;
  line-height:1.4;
  color:var(--accent);
  transition:color var(--dur) ease, opacity .18s ease;
}
.subtitle em{
  font-family:'Newsreader',serif;
  font-style:italic;
  font-weight:500;
  font-size:3.9rem;
  line-height:1;
}

/* ILLUSTRATION */
.illustration{
  position:absolute;
  right:4.29rem;
  top:0;
  width:38%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:auto;
  cursor:pointer;
  overflow:visible;
}
.illustration:hover svg{transform:scale(1.04)}

/* ── CUSTOM CURSOR (solid dot + hover pill) ─── */
html, body, .illustration, .nav-card, a, button{cursor:none}
.cursor{
  position:fixed;
  top:0;left:0;
  width:1.65rem;height:1.65rem;
  pointer-events:none;
  z-index:9999;
  mix-blend-mode:difference;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:width 0.3s cubic-bezier(.2,.7,.2,1), height 0.3s cubic-bezier(.2,.7,.2,1), border-radius 0.3s cubic-bezier(.2,.7,.2,1);
}
/* solid filled dot */
.cursor-ring{
  position:absolute;
  inset:0;
  background:#fff;
  border-radius:50%;
  transition:background 0.25s ease, border-radius 0.3s cubic-bezier(.2,.7,.2,1);
}
/* label (hidden by default) */
.cursor-label{
  position:relative;
  font-family:'IBM Plex Mono',monospace;
  font-weight:700;
  font-size:1.95rem;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:#000;
  white-space:nowrap;
  opacity:0;
  transition:opacity 0.2s ease 0.1s;
  z-index:1;
}
/* hover state: morph into pill with label */
.cursor.hover{
  width:10.8rem;height:4.5rem;
  border-radius:2rem;
}
.cursor.hover .cursor-ring{
  border-radius:2rem;
  background:#fff;
}
.cursor.hover .cursor-label{opacity:1}
@media (hover: none){
  html, body, .illustration, .nav-card, a, button{cursor:auto}
  .cursor{display:none}
}

/* ── DETAIL PAGE OVERLAY ─── */
.detail-page{
  position:fixed;inset:0;
  background:var(--bg);
  color:var(--accent);
  z-index:500;
  opacity:0;visibility:hidden;
  pointer-events:none;
  transition:opacity 0.45s cubic-bezier(.2,.7,.2,1), visibility 0s linear 0.45s;
  overflow-y:auto;overflow-x:hidden;
  padding:3rem 4.29rem 6rem;
}
.detail-page.open{
  opacity:1;visibility:visible;pointer-events:auto;
  transition:opacity 0.45s cubic-bezier(.2,.7,.2,1), visibility 0s;
}
.detail-topbar{position:relative;height:0;pointer-events:none}
.detail-topbar > *{pointer-events:auto}
.detail-topbar .detail-back{position:fixed;top:3rem;left:4.29rem;z-index:30}
.detail-topbar .detail-logo{position:absolute;top:3rem;right:0}
.detail-back{
  display:inline-flex;align-items:center;gap:0.8rem;
  background:var(--bg);border:0.15rem solid var(--accent);
  color:var(--accent);
  font-family:'IBM Plex Mono',monospace;font-weight:700;
  font-size:1.1rem;letter-spacing:0.18em;text-transform:uppercase;
  padding:0.9rem 1.6rem;border-radius:2rem;
  cursor:pointer;
  transition:background 0.25s ease, color 0.25s ease, transform 0.25s ease;
}
.detail-back:hover{background:var(--accent);color:var(--bg);transform:translateX(-0.3rem)}
.detail-back svg{width:1.2rem;height:1.2rem}
.detail-logo{
  display:flex;align-items:baseline;gap:0.7rem;
  color:var(--accent);
}
.logo-svg-d{height:3.2rem;width:auto;color:var(--accent)}
.detail-logo .sub{
  font-family:'Newsreader',serif;font-style:italic;font-weight:500;
  font-size:2.2rem;letter-spacing:-0.01em;line-height:1;color:var(--accent);
}
.detail-inner{
  width:100%;margin:2rem 0 0;
}

/* manifesto hero */
.detail-hero{
  display:block;margin:4rem 0 8rem;min-height:40rem;
  display:flex;align-items:center;min-height:48rem;
}
.detail-hero .detail-copy{max-width:130rem}
.detail-kicker{
  font-family:'IBM Plex Mono',monospace;font-weight:700;
  font-size:1.3rem;letter-spacing:0.3em;text-transform:uppercase;
  margin-bottom:3rem;opacity:0.7;
}
.detail-kicker::before{content:'— '}
.manifesto{
  font-family:'Roboto',sans-serif;font-weight:900;
  font-size:12rem;line-height:0.92;letter-spacing:-0.03em;
  text-transform:uppercase;margin-bottom:3.5rem;
}
.manifesto em{
  font-family:'Newsreader',serif;font-style:italic;font-weight:500;
  letter-spacing:-0.01em;text-transform:none;
}
.detail-lead{
  font-family:'Roboto',sans-serif;font-weight:300;
  font-size:2.1rem;line-height:1.45;max-width:72rem;opacity:0.92;
}
.detail-lead strong{font-weight:700;font-style:normal}
/* editorial drop cap — first letter of lead paragraph */
.detail-lead::first-letter{
  font-family:'Newsreader',serif;font-style:italic;font-weight:500;
  font-size:6rem;line-height:0.85;
  float:left;padding:0.4rem 1.2rem 0 0;color:var(--accent);
}
.detail-illus{display:flex;align-items:center;justify-content:center}
.detail-illus svg{width:100%;max-width:56rem;height:auto}

/* agencies strip */
.agencies{
  display:flex;gap:0;margin:0 0 10rem;
  border-top:0.12rem solid var(--accent);border-bottom:0.12rem solid var(--accent);
  overflow:hidden;white-space:nowrap;
}
.agencies-track{
  display:flex;gap:5rem;padding:2.4rem 0;
  animation:agencyScroll 30s linear infinite;
}
.agencies-track span{
  font-family:'Roboto',sans-serif;font-weight:800;
  font-size:3rem;letter-spacing:-0.01em;text-transform:uppercase;
  display:inline-flex;align-items:center;gap:5rem;
}
.agencies-track span::after{content:'✦';font-weight:400;opacity:0.5}
@keyframes agencyScroll{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

/* works list */
.detail-section-label{
  font-family:'IBM Plex Mono',monospace;font-weight:700;
  font-size:1.3rem;letter-spacing:0.3em;text-transform:uppercase;
  margin-bottom:1.5rem;opacity:0.6;
}
.detail-section-label::before{content:'— '}
.section-title{
  font-family:'Roboto',sans-serif;font-weight:900;
  font-size:8rem;line-height:1;letter-spacing:-0.02em;
  text-transform:uppercase;margin-bottom:5rem;
}
.works-list{
  display:flex;flex-direction:column;
  border-top:0.1rem solid rgba(255,49,59,0.3);
}
.work-row{
  display:grid;grid-template-columns:5rem 1fr 38rem;
  gap:4rem;align-items:center;
  padding:3rem 0.5rem;
  border-bottom:0.1rem solid rgba(255,49,59,0.3);
  cursor:pointer;position:relative;
  transition:padding 0.35s cubic-bezier(.2,.7,.2,1);
}
.work-row:hover{padding-left:2.4rem}
.work-row::before{
  content:'';position:absolute;left:0;top:0;height:100%;width:0;
  background:var(--accent);opacity:0.08;
  transition:width 0.35s cubic-bezier(.2,.7,.2,1);
}
.work-row:hover::before{width:100%}
.work-num{
  font-family:'IBM Plex Mono',monospace;font-weight:700;
  font-size:1.3rem;letter-spacing:0.22em;opacity:0.6;
  position:relative;z-index:1;align-self:flex-start;padding-top:0.6rem;
}
.work-mid{position:relative;z-index:1;display:flex;flex-direction:column;gap:1.3rem}
.work-title{
  font-family:'Roboto',sans-serif;font-weight:800;
  font-size:4.2rem;line-height:1.02;letter-spacing:-0.02em;
  text-transform:uppercase;
}
.work-title .caption{
  display:block;font-family:'Newsreader',serif;font-style:italic;
  font-weight:400;font-size:1.6rem;letter-spacing:0;opacity:0.7;
  margin-top:0.7rem;text-transform:none;
}
.work-meta{
  display:flex;align-items:center;gap:1.4rem;flex-wrap:wrap;
  font-family:'IBM Plex Mono',monospace;font-weight:500;
  font-size:1.05rem;letter-spacing:0.18em;text-transform:uppercase;
}
.work-year{opacity:0.7;padding-right:0.6rem;border-right:0.08rem solid rgba(255,49,59,0.4)}
.work-tags{display:flex;flex-wrap:wrap;gap:0.55rem;opacity:0.85}
.work-tags span{
  border:0.08rem solid var(--accent);
  padding:0.4rem 0.85rem;border-radius:1rem;
}
.work-preview{
  position:relative;z-index:1;
  aspect-ratio:16/9;width:100%;
  background:#1a1a1a;overflow:hidden;
  border:0.1rem solid rgba(255,49,59,0.3);
  transition:transform 0.35s cubic-bezier(.2,.7,.2,1), border-color 0.3s ease;
}
.work-preview img{
  width:100%;height:100%;object-fit:cover;
  transform:scale(1.02);
  transition:transform 0.6s cubic-bezier(.2,.7,.2,1), filter 0.3s ease;
  filter:saturate(0.9) contrast(1.05);
}
.work-row:hover .work-preview{border-color:var(--accent)}
.work-row:hover .work-preview img{transform:scale(1.08);filter:saturate(1) contrast(1.1)}

/* ── PROJECT DETAIL (inside a work) ─── */
.project-view{
  position:fixed;inset:0;z-index:700;
  background:var(--bg);color:var(--accent);
  overflow-y:auto;overflow-x:hidden;
  opacity:0;visibility:hidden;pointer-events:none;
  transform:translateY(100%);
  transition:opacity 0.55s cubic-bezier(.2,.7,.2,1), transform 0.7s cubic-bezier(.2,.7,.2,1), visibility 0s linear 0.7s;
  padding:3rem 4.29rem 0;
}
.project-view.open{
  opacity:1;visibility:visible;pointer-events:auto;transform:translateY(0);
  transition:opacity 0.55s cubic-bezier(.2,.7,.2,1), transform 0.7s cubic-bezier(.2,.7,.2,1), visibility 0s;
}
.project-view .detail-topbar{margin-bottom:2rem}

/* project hero — editorial magazine opener with brutalist case-number */
.project-hero{margin:6rem 0 4rem;position:relative}
.project-hero .p-top{
  display:flex;justify-content:space-between;align-items:baseline;
  padding-bottom:1.5rem;border-bottom:0.1rem solid rgba(255,49,59,0.35);
  font-family:'IBM Plex Mono',monospace;font-weight:700;
  font-size:1.3rem;letter-spacing:0.28em;text-transform:uppercase;
}
.project-hero .p-index{opacity:0.7}
.project-hero .p-year-top{opacity:0.9}
.project-hero .p-title{
  font-family:'Roboto',sans-serif;font-weight:900;
  font-size:18rem;line-height:0.88;letter-spacing:-0.035em;
  text-transform:uppercase;margin:4rem 0 3rem;
  position:relative;z-index:2;
}
/* huge case-number watermark behind title */
.project-hero[data-num]::before{
  content:attr(data-num);
  position:absolute;right:0;top:5rem;
  font-family:'Roboto',sans-serif;font-weight:900;
  font-size:32rem;line-height:0.85;letter-spacing:-0.06em;
  color:var(--accent);opacity:0.06;
  z-index:1;pointer-events:none;
  font-feature-settings:'tnum' 1;
}
.project-hero .p-meta-row{
  display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start;
  padding-top:2.5rem;border-top:0.25rem solid var(--accent);
}
.project-hero .p-caption{
  font-family:'Newsreader',serif;font-style:italic;font-weight:400;
  font-size:2.4rem;line-height:1.3;opacity:0.95;max-width:60rem;
}
.project-hero .p-tags{
  display:flex;flex-wrap:wrap;gap:0.7rem;justify-content:flex-end;
  font-family:'IBM Plex Mono',monospace;font-weight:500;
  font-size:1.05rem;letter-spacing:0.22em;text-transform:uppercase;
}
.project-hero .p-tags span{border:0.1rem solid var(--accent);padding:0.55rem 1.1rem;border-radius:1.4rem;opacity:0.85}

.project-gallery{display:flex;flex-direction:column;gap:2rem;margin-top:2rem}
.project-gallery .g-item{width:100%;background:#1a1a1a;overflow:hidden;border:0.1rem solid rgba(255,49,59,0.2)}
.project-gallery .g-item img{width:100%;height:auto;display:block}
.project-nav-next{
  margin:10rem 0 0;padding:5rem 0 6rem;
  display:flex;justify-content:space-between;align-items:center;
  border-top:0.2rem solid var(--accent);
}
.project-nav-next .pn-block{max-width:80%}
.project-nav-next .pn-label{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:1.15rem;letter-spacing:0.3em;opacity:0.6;text-transform:uppercase}
.project-nav-next .pn-title{font-family:'Roboto',sans-serif;font-weight:900;font-size:7rem;line-height:0.95;letter-spacing:-0.025em;text-transform:uppercase;margin-top:1rem;cursor:pointer;transition:opacity 0.25s ease, transform 0.35s cubic-bezier(.2,.7,.2,1);display:inline-block}
.project-nav-next .pn-title:hover{opacity:0.75;transform:translateX(0.6rem)}
.project-nav-next .pn-arrow{
  width:6rem;height:6rem;border-radius:50%;flex-shrink:0;
  background:var(--accent);color:var(--bg);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:transform 0.35s cubic-bezier(.2,.7,.2,1);
}
.project-nav-next .pn-arrow:hover{transform:scale(1.1) translateX(0.4rem)}
.project-nav-next .pn-arrow svg{width:2.2rem;height:2.2rem}

/* project view entrance animations */
@keyframes projFadeUp{from{opacity:0;transform:translateY(2rem)}to{opacity:1;transform:translateY(0)}}
.project-view.open .p-top{animation:projFadeUp 0.5s 0.15s cubic-bezier(.2,.7,.2,1) both}
.project-view.open .p-title{animation:detailGlitchIn 0.8s 0.2s cubic-bezier(.2,.7,.2,1) both}
.project-view.open .p-meta-row{animation:projFadeUp 0.55s 0.45s cubic-bezier(.2,.7,.2,1) both}
.project-view.open .project-gallery .g-item{animation:projFadeUp 0.5s calc(0.55s + var(--gi,0) * 0.06s) cubic-bezier(.2,.7,.2,1) both}

/* Footer CTA */
.collab-cta{
  margin-top:10rem;padding:6rem 0;
  border-top:0.12rem solid var(--accent);border-bottom:0.12rem solid var(--accent);
  text-align:center;
}
.collab-cta .collab-kicker{
  font-family:'IBM Plex Mono',monospace;font-weight:700;
  font-size:1.05rem;letter-spacing:0.3em;text-transform:uppercase;
  margin-bottom:2rem;opacity:0.7;
}
.collab-cta .collab-title{
  font-family:'Roboto',sans-serif;font-weight:900;
  font-size:9rem;line-height:0.9;letter-spacing:-0.03em;
  text-transform:uppercase;margin-bottom:2rem;
}
.collab-cta .collab-title em{
  font-family:'Newsreader',serif;font-style:italic;font-weight:500;
  text-transform:none;letter-spacing:-0.01em;
}
.collab-cta .collab-lead{
  font-family:'Roboto',sans-serif;font-weight:300;font-size:1.6rem;
  max-width:60rem;margin:0 auto 3rem;line-height:1.5;opacity:0.85;
}
.collab-btn{
  display:inline-flex;align-items:center;gap:1rem;
  background:var(--accent);color:var(--bg);
  font-family:'IBM Plex Mono',monospace;font-weight:700;
  font-size:1.2rem;letter-spacing:0.2em;text-transform:uppercase;
  padding:1.4rem 2.8rem;border-radius:3rem;text-decoration:none;
  transition:transform 0.25s ease, background 0.25s ease;
}
.collab-btn:hover{transform:scale(1.04) translateY(-0.2rem)}

/* entrance anim for detail */
@keyframes detailGlitchIn{
  0%{opacity:0;transform:translateX(2rem) skewX(6deg);text-shadow:0.8rem 0 rgba(255,49,59,0.9),-0.8rem 0 rgba(0,255,255,0.6)}
  40%{opacity:1;transform:translateX(-0.6rem) skewX(-3deg);text-shadow:-0.4rem 0 rgba(255,49,59,0.7),0.4rem 0 rgba(0,255,255,0.4)}
  100%{opacity:1;transform:translateX(0) skewX(0);text-shadow:none}
}
@keyframes detailFadeUp{
  from{opacity:0;transform:translateY(2rem)}
  to{opacity:1;transform:translateY(0)}
}
.detail-page.open .manifesto{animation:detailGlitchIn 0.8s cubic-bezier(.2,.7,.2,1) both}
.detail-page.open .detail-kicker{animation:detailFadeUp 0.5s 0.1s cubic-bezier(.2,.7,.2,1) both}
.detail-page.open .detail-lead{animation:detailFadeUp 0.6s 0.3s cubic-bezier(.2,.7,.2,1) both}
.detail-page.open .detail-illus{animation:detailFadeUp 0.7s 0.4s cubic-bezier(.2,.7,.2,1) both}
.illustration svg{
  height:144%;
  max-height:none;
  width:auto;
  flex-shrink:0;
  color:var(--accent);
  transition:color var(--dur) ease, opacity .18s ease;
}
.illustration[data-id="vision"] svg{
  translate:-10% 0;
}
.illustration[data-id="originals"] svg{
  translate:-7% 0;
}

/* FOOTER INFO */
.footer-info{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  padding:0 4.29rem;
  transform:translateY(3rem);
  color:var(--accent);
  transition:color var(--dur) ease;
}
.pick-label{
  display:block;
  font-family:'Newsreader',serif;
  font-style:italic;
  font-weight:300;
  font-size:1.88rem;
  margin-bottom:0.3rem;
}
.pick-label::before{
  content:'— ';
  font-family:'Roboto',sans-serif;
  font-style:normal;
  font-weight:500;
}
.counter-num{
  display:block;
  font-family:'Roboto',sans-serif;
  font-weight:200;
  font-size:2.6rem;
  transition:color var(--dur) ease;
}
.counter-num .counter-section{
  font-weight:500;
}
.click-hint{
  font-family:'Newsreader',serif;
  font-style:italic;
  font-weight:500;
  font-size:1.6rem;
}

/* NAV CARDS */
.nav-cards{
  display:flex;
  padding:2.2rem 4.29rem 9rem;
  transform:translateY(3rem);
  gap:1.61rem;
  align-items:stretch;
  height:100%;
}
.nav-card{
  flex:1;
  padding:0 2.2rem;
  cursor:pointer;
  border:0.2rem solid transparent;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:1.4rem;
  transition:transform 0.22s ease, background var(--dur) ease, border-color var(--dur) ease, color var(--dur) ease;
  user-select:none;
  overflow:hidden;
  min-height:11.85rem;
  max-height:11.85rem;
  position:relative;
}
.nav-card:hover{transform:translateY(-0.3rem)}
.nav-card .c-num,
.nav-card .c-title,
.nav-card .c-sub,
.nav-card .c-icon{
  color:inherit;
  transition:color var(--dur) ease;
}
.nav-card.active{border-width:0.2rem}

.c-info{flex:1;min-width:0;position:relative;z-index:2}
.c-num{
  font-family:'Roboto',sans-serif;
  font-size:1.42rem;
  font-weight:400;
  letter-spacing:0.02em;
  display:block;
  margin-bottom:0.6rem;
}
.c-title{
  font-family:'Roboto',sans-serif;
  font-weight:800;
  font-size:2.83rem;
  letter-spacing:0;
  display:block;
  white-space:nowrap;
  line-height:1;
}
.c-sub{
  font-family:'Newsreader',serif;
  font-style:italic;
  font-weight:400;
  font-size:1.5rem;
  display:block;
  line-height:1.2;
  margin-top:0.5rem;
}

.c-icon{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:1;
}
.c-icon svg{
  width:100%;
  height:100%;
  display:block;
  overflow:visible;
}

.fading{opacity:0 !important}

/* Card hover */
.nav-card{transition:background var(--dur) ease, border-color var(--dur) ease, color var(--dur) ease}

/* ── HEADLINE GLITCH-IN (switch only) ─────────────────── */
@keyframes glitchIn{
  0%{opacity:0;transform:translateX(1.8rem) skewX(8deg);text-shadow:0.6rem 0 rgba(255,49,59,0.9),-0.6rem 0 rgba(0,255,255,0.6)}
  30%{opacity:1;transform:translateX(-0.6rem) skewX(-5deg);text-shadow:-0.5rem 0 rgba(255,49,59,0.9),0.5rem 0 rgba(0,255,255,0.6)}
  55%{transform:translateX(0.4rem) skewX(3deg);text-shadow:0.3rem 0 rgba(255,49,59,0.7),-0.3rem 0 rgba(0,255,255,0.4)}
  80%{transform:translateX(-0.15rem) skewX(-1deg);text-shadow:-0.15rem 0 rgba(255,49,59,0.5),0.15rem 0 rgba(0,255,255,0.3)}
  100%{opacity:1;transform:translateX(0) skewX(0);text-shadow:none}
}
.switching .headline{animation:glitchIn 0.6s cubic-bezier(.2,.7,.2,1) both}

@keyframes illusGlitchPop{
  0%{filter:drop-shadow(0.6rem 0 rgba(255,49,59,0.85)) drop-shadow(-0.6rem 0 rgba(0,255,255,0.6))}
  40%{filter:drop-shadow(-0.5rem 0 rgba(255,49,59,0.85)) drop-shadow(0.5rem 0 rgba(0,255,255,0.6))}
  70%{filter:drop-shadow(0.25rem 0 rgba(255,49,59,0.55)) drop-shadow(-0.25rem 0 rgba(0,255,255,0.35))}
  100%{filter:drop-shadow(0 0 0 transparent)}
}
.illustration svg{transform-origin:center center}
.switching .illustration svg{animation:illusGlitchPop 0.7s cubic-bezier(.2,.7,.2,1) both}

@keyframes subFadeUp{
  from{opacity:0;transform:translateY(1.2rem)}
  to{opacity:1;transform:translateY(0)}
}
.switching .subtitle{animation:subFadeUp 0.55s 0.15s cubic-bezier(.2,.7,.2,1) both}

@keyframes flashBurst{
  0%,100%{opacity:0}
  8%{opacity:0.4}
  30%{opacity:0}
}
body::after{content:'';position:fixed;inset:0;background:var(--accent);opacity:0;pointer-events:none;z-index:999;mix-blend-mode:difference}
body.switching::after{animation:flashBurst 0.45s ease-out}

@keyframes invertFlash{
  0%,100%{filter:none}
  10%{filter:invert(1) hue-rotate(180deg)}
  25%{filter:invert(1) hue-rotate(180deg)}
  40%{filter:none}
}
body.switching{animation:invertFlash 0.5s ease-out}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none !important;transition:none !important}
}

/* ═══════════════════════════════════════════════════════
   MOBILE — responsive layout (≤768px)
   ═══════════════════════════════════════════════════════ */
@media (max-width: 768px){
  html{font-size:10px}
  body{
    display:flex;flex-direction:column;
    grid-template-rows:none;
    height:100vh;max-height:100vh;
    overflow:hidden;
  }

  /* HEADER */
  .header{padding:1.5rem 1.5rem 0.5rem;flex:0 0 auto}
  .logo-svg{height:3rem}
  .logo-studio{font-size:1.2rem}
  .header-right .tagline{display:none}
  .header-right{text-align:right}
  .header-right .website{font-size:0.95rem}

  /* HIDE legacy footer-info/dots on mobile — keep .hero VISIBLE for poch redesign */
  .footer-info, .carousel-dots{display:none !important}

  /* NAV CARDS — full-bleed brutalist 2x2 grid, no gaps */
  .nav-cards{
    flex:1 1 auto;
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr;
    gap:0;
    padding:0;margin-top:0.6rem;
    transform:none;overflow:hidden;height:auto;
    border-top:0.15rem solid var(--accent);
  }
  .nav-card{
    padding:1.5rem;
    display:flex;flex-direction:column;justify-content:flex-start;
    align-items:stretch;gap:0;
    position:relative;overflow:hidden;
    border:0;border-right:0.15rem solid currentColor;border-bottom:0.15rem solid currentColor;
    min-height:0;max-height:none;
    flex:0 1 auto;scroll-snap-align:none;
    transition:transform 0.18s ease;
  }
  .nav-card:nth-child(2n){border-right:0}
  .nav-card:nth-child(n+3){border-bottom:0}
  .nav-card:active{transform:scale(0.97)}
  .nav-card:hover{transform:none}
  /* GIANT section number watermark */
  .nav-card::before{
    content:attr(data-num);
    position:absolute;top:-2rem;right:-0.5rem;
    font-family:'Roboto',sans-serif;font-weight:900;
    font-size:14rem;line-height:1;letter-spacing:-0.06em;
    color:currentColor;opacity:0.1;
    z-index:1;pointer-events:none;
  }
  .nav-card .c-info{
    display:flex;flex-direction:column;gap:0.6rem;
    position:relative;z-index:3;
  }
  .nav-card .c-num{
    font-family:'IBM Plex Mono',monospace;font-weight:700;
    font-size:0.85rem;letter-spacing:0.3em;opacity:0.85;
    text-transform:uppercase;margin-bottom:0.2rem;
  }
  .nav-card .c-title{
    font-size:2.6rem;line-height:0.9;letter-spacing:-0.03em;
    font-weight:900;
  }
  .nav-card .c-sub{
    font-family:'Newsreader',serif;font-style:italic;font-weight:400;
    font-size:1.1rem;line-height:1.25;text-transform:none;
    opacity:0.85;letter-spacing:0;margin-top:0.4rem;
  }
  .nav-card .c-icon{
    position:absolute;right:-3.5rem;bottom:-3rem;
    width:17rem;height:17rem;z-index:2;
    opacity:0.55;pointer-events:none;
  }
  .nav-card .c-icon svg{width:100%;height:100%}
  /* enter affordance — arrow + ENTER label bottom-left */
  .nav-card .c-enter{
    position:absolute;left:1.5rem;bottom:1.3rem;
    z-index:3;display:flex;align-items:center;gap:0.4rem;
    font-family:'IBM Plex Mono',monospace;font-weight:700;
    font-size:0.75rem;letter-spacing:0.25em;text-transform:uppercase;
    opacity:0.85;
  }
  .nav-card .c-enter::after{content:'→';font-size:1.1rem;line-height:1}
  /* per-section palette */
  .nav-card[data-id="originals"]{background:#0D0D0D;color:#FF313B}
  .nav-card[data-id="bubble"]{background:#D0FA51;color:#584CF5}
  .nav-card[data-id="music"]{background:#FF313B;color:#D0FA51}
  .nav-card[data-id="vision"]{background:#584CF5;color:#D0FA51}

  /* CUSTOM CURSOR — hide on touch (already via hover:none, belt+braces) */

  /* ─── DETAIL PAGE ─── */
  .detail-page{padding:1.5rem 1.25rem 3rem}
  .detail-topbar .detail-back{
    top:1rem;left:1rem;
    font-size:0.9rem;padding:0.6rem 1.1rem;gap:0.5rem;

  .section-title{font-size:4.5rem;margin-bottom:2.5rem;line-height:1}

  /* works rows — stack image on top */

    display:flex;flex-direction:column;gap:1.2rem;

  .work-row:hover{padding-left:0.2rem}
  .work-num{font-size:0.9rem;padding:0;opacity:0.6}

/* extra-small phones (<380px) */
@media (max-width: 380px){
  html{font-size:9.2px}

/* ═══════════════════════════════════════════════════════
   POCH-STYLE OVERLAY (poch.studio-inspired refined system)
   Drops the per-section red flips, switches to cream-on-black,
   floating bottom pill navbar, calmer hero.
   ═══════════════════════════════════════════════════════ */
html, body{overflow:hidden;height:100vh;max-height:100vh}
body{
  font-family:'Hanken Grotesk', system-ui, sans-serif;
  font-weight:400;
  background:var(--bg) !important;
  color:var(--accent) !important;
  display:flex !important;flex-direction:column;
  grid-template-rows:none !important;
  height:100vh;max-height:100vh;
  padding-bottom:0;
}

/* ─── TOPBAR — hidden per design direction (more space for hero) ─── */
.topbar{display:none}
.topbar-was{
  display:flex;justify-content:space-between;align-items:center;
  padding:2rem 2.4rem;
  position:relative;z-index:5;
}
.topbar-logo{
  display:inline-flex;align-items:baseline;gap:0.6rem;
  color:var(--accent);text-decoration:none;
}
.topbar-logo .logo-svg{height:2.2rem;width:auto;color:var(--accent)}
.topbar-logo .topbar-mark{
  font-family:'Newsreader',serif;font-style:italic;font-weight:500;
  font-size:1.3rem;letter-spacing:-0.01em;color:var(--accent);
}
.topbar-link{
  font-family:'IBM Plex Mono',monospace;font-weight:500;
  font-size:0.85rem;letter-spacing:0.06em;
  color:var(--accent);text-decoration:none;opacity:0.8;
  transition:opacity 0.2s ease;
}
.topbar-link:hover{opacity:1}

/* ─── HERO — text top, avatar dominant below; full-viewport, no scroll ─── */
.hero{
  position:relative;
  flex:1 1 0%;min-height:0;
  display:grid;
  grid-template-rows:auto minmax(0,1fr);
  align-items:center;justify-items:center;
  padding:3rem 2rem 7rem;
  overflow:hidden;
  gap:1.5rem;
}
.hero-copy{
  grid-row:1;position:relative;z-index:3;
  text-align:center;max-width:62rem;
  margin-top:1rem;
}
.hero .illustration{
  position:relative !important;
  grid-row:2;min-height:0;
  inset:auto;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  z-index:2;opacity:1;overflow:hidden;
  pointer-events:auto;
  perspective:1100px;
  transition:opacity 0.5s ease;
}
/* line-art SVG illustrations: HIDDEN until we have a 3D avatar for that section */
.hero .illustration svg{display:none}

/* 3D avatar — fake-3D layered effect (transform + light + idle bob) */
.hero .illustration{height:100%}
.avatar-stage{
  position:relative;height:100%;width:auto;
  display:flex;align-items:center;justify-content:center;
  perspective:1200px;
  transform-style:preserve-3d;
}
/* idle floating wrapper — applies bob/sway animation independent of cursor tilt */
.avatar-float{
  height:100%;display:flex;align-items:center;justify-content:center;
  animation:avatarIdle 6s ease-in-out infinite;
  transform-style:preserve-3d;
}
@keyframes avatarIdle{
  0%,100%{transform:translateY(0) rotateZ(0deg)}
  50%{transform:translateY(-1.4rem) rotateZ(0.6deg)}
}
/* the actual image — cursor-driven 3D tilt */
.hero .illustration .avatar3d{
  height:100%;max-height:100%;width:auto;max-width:100%;
  object-fit:contain;display:block;
  position:relative;z-index:2;
  filter:drop-shadow(0 50px 100px rgba(248,229,181,0.10)) drop-shadow(0 12px 30px rgba(0,0,0,0.55));
  transform:
    rotateX(var(--avatar-rx, 0deg))
    rotateY(var(--avatar-ry, 0deg))
    scale(var(--avatar-scale, 1))
    translateZ(0);
  transform-style:preserve-3d;
  transition:transform 0.08s linear, filter 0.4s ease;
  user-select:none;-webkit-user-drag:none;
}
/* light overlay disabled — caused a visible box; tilt+shadow alone give the 3D feel */
.avatar-light{display:none}
/* soft floor-glow that breathes */
.avatar-shadow{
  position:absolute;left:50%;bottom:5%;
  width:46%;height:8%;
  transform:translateX(-50%) translateX(calc(var(--shadow-shift, 0) * 1px));
  background:radial-gradient(ellipse, rgba(248, 229, 181, 0.18) 0%, transparent 70%);
  filter:blur(20px);
  z-index:1;pointer-events:none;
  animation:shadowBreath 6s ease-in-out infinite;
}
@keyframes shadowBreath{
  0%,100%{opacity:0.7;transform:translateX(-50%) scaleX(1)}
  50%{opacity:1;transform:translateX(-50%) scaleX(1.12)}
}
/* hover state — scale up slightly, brighter light */
.hero .illustration:hover .avatar3d{--avatar-scale:1.04}
.hero .illustration:hover .avatar-light{opacity:1.2}
.hero-counter{grid-row:3}
.hero-copy{
  position:relative;z-index:2;text-align:center;
  max-width:62rem;
}
.hero-line{
  font-family:'Hanken Grotesk',system-ui,sans-serif;
  font-weight:500;font-size:3.4rem;line-height:1.08;
  letter-spacing:-0.025em;color:var(--accent);
  white-space:normal;text-transform:none;
  margin-bottom:0.7rem;text-shadow:none;
}
.hero-line em, .hero-line .accent{
  font-family:'Newsreader',serif;font-style:italic;font-weight:500;
  letter-spacing:-0.01em;color:var(--cta);
}
.hero-line-sub{
  font-family:'Newsreader',serif;font-style:italic;font-weight:400;
  font-size:1.45rem;line-height:1.4;color:var(--accent-soft);
  max-width:46rem;margin:0 auto;
}
.hero-counter{display:none !important}

/* ─── 3D ORB — disabled per design direction ─── */
.orb3d, .detail-orb{display:none !important}
.orb3d-keep-styles{
  position:absolute;left:50%;bottom:7rem;transform:translateX(-50%);
  width:11rem;height:11rem;
  perspective:600px;transform-style:preserve-3d;
  z-index:2;pointer-events:none;
}
.orb3d-ring{
  position:absolute;inset:0;
  border-radius:50%;
  border:0.18rem solid var(--cta);
  transform-style:preserve-3d;
  animation:orb3dSpin 8s linear infinite;
  box-shadow:
    0 0 30px rgba(248, 229, 181, 0.25),
    inset 0 0 18px rgba(248, 229, 181, 0.15),
    inset 0 -12px 30px rgba(248, 229, 181, 0.08);
}
.orb3d-ring-2{
  border-color:rgba(245, 240, 225, 0.4);
  border-width:0.12rem;
  animation:orb3dSpin2 12s linear infinite reverse;
  inset:0.6rem;
}
.orb3d-ring-3{
  border-color:rgba(245, 240, 225, 0.18);
  border-width:0.08rem;
  animation:orb3dSpin3 18s linear infinite;
  inset:1.2rem;
}
.orb3d-glow{
  position:absolute;left:50%;bottom:-1rem;
  width:6rem;height:1.2rem;
  transform:translateX(-50%);
  background:radial-gradient(ellipse, rgba(248, 229, 181, 0.25) 0%, transparent 70%);
  filter:blur(8px);
  animation:orb3dPulse 4s ease-in-out infinite;
}
@keyframes orb3dSpin{
  0% { transform: rotateX(72deg) rotateZ(0deg); }
  50% { transform: rotateX(78deg) rotateZ(180deg); }
  100% { transform: rotateX(72deg) rotateZ(360deg); }
}
@keyframes orb3dSpin2{
  0% { transform: rotateX(75deg) rotateY(15deg) rotateZ(0deg); }
  100% { transform: rotateX(75deg) rotateY(15deg) rotateZ(-360deg); }
}
@keyframes orb3dSpin3{
  0% { transform: rotateX(70deg) rotateY(-12deg) rotateZ(0deg); }
  100% { transform: rotateX(70deg) rotateY(-12deg) rotateZ(360deg); }
}
@keyframes orb3dPulse{
  0%,100% { opacity:0.7; transform:translateX(-50%) scaleX(1); }
  50% { opacity:1; transform:translateX(-50%) scaleX(1.15); }
}
@media (max-width: 768px){
  .orb3d{width:4.6rem;height:4.6rem;bottom:auto;top:38rem}
}
.detail-orb{
  display:flex;justify-content:center;
  margin:6rem 0 4rem;height:11rem;position:relative;
}
.detail-orb .orb3d{position:relative;left:auto;bottom:auto;transform:none;width:7rem;height:7rem}
@media (max-width: 768px){
  .detail-orb{margin:4rem 0 2.5rem;height:7rem}
  .detail-orb .orb3d{width:5rem;height:5rem}
}

/* ─── FLOATING BOTTOM PILL NAVBAR ─── */
.bottomnav{
  position:fixed;left:50%;bottom:1.5rem;transform:translateX(-50%);
  display:flex;align-items:center;gap:0.5rem;
  z-index:80;
  padding:0;margin:0;
  background:none;border:none;
}
.bottomnav-pill{
  display:inline-flex;align-items:center;justify-content:center;
  background:rgba(22, 20, 16, 0.55);
  -webkit-backdrop-filter:blur(18px) saturate(140%);
  backdrop-filter:blur(18px) saturate(140%);
  color:var(--accent);
  border:0.08rem solid rgba(245, 240, 225, 0.12);
  border-radius:999px;
  padding:0.7rem 1.2rem;
  font-family:'Hanken Grotesk',system-ui,sans-serif;
  font-weight:500;font-size:0.95rem;letter-spacing:-0.005em;
  transition:background 0.2s ease, color 0.2s ease, transform 0.2s ease;
  white-space:nowrap;
  box-shadow:0 6px 22px rgba(0,0,0,0.35), inset 0 1px 0 rgba(245,240,225,0.04);
}
.bottomnav-mark{
  width:3.8rem;height:3.8rem;padding:0.85rem;
  background:rgba(22, 20, 16, 0.55);
  color:var(--accent);
  -webkit-backdrop-filter:blur(18px) saturate(140%);
  backdrop-filter:blur(18px) saturate(140%);
  border:0.08rem solid rgba(245, 240, 225, 0.12);
}
.bottomnav-mark svg{width:100%;height:auto;color:var(--accent)}
.bottomnav-links{
  gap:0.2rem;padding:0.4rem 0.5rem;
  flex-wrap:nowrap;
}
.bottomnav-links .nav-card{
  cursor:pointer;
  background:transparent !important;color:var(--accent) !important;
  border:0 !important;
  border-radius:999px;
  padding:0.5rem 1rem;
  font-family:'Hanken Grotesk',system-ui,sans-serif;
  font-weight:500;font-size:0.9rem;letter-spacing:-0.005em;
  display:inline-flex;align-items:center;gap:0.4rem;
  min-height:auto;max-height:none;flex:0 0 auto;
  transition:background 0.2s ease, color 0.2s ease;
  position:static;overflow:visible;
}
.bottomnav-links .nav-card .c-info{flex-direction:row;gap:0;align-items:center}
.bottomnav-links .nav-card .c-num,
.bottomnav-links .nav-card .c-sub,
.bottomnav-links .nav-card .c-icon{display:none}
.bottomnav-links .nav-card .c-title{
  font-size:0.9rem;font-weight:500;letter-spacing:-0.005em;
  text-transform:none;line-height:1;color:inherit;
}
.bottomnav-links .nav-card.active{
  background:var(--accent) !important;color:var(--bg) !important;
}
.bottomnav-links .nav-card:hover:not(.active){
  background:rgba(245,240,225,0.08) !important;
}
/* hide all decorative pseudo-elements from the old card style */
.bottomnav-links .nav-card::before,
.bottomnav-links .nav-card::after,
.bottomnav-links .nav-card .c-enter{display:none !important}

.bottomnav-cta{
  background:var(--cta);color:#1A1815;
  border:0.08rem solid rgba(0,0,0,0.06);
  -webkit-backdrop-filter:none;backdrop-filter:none;
  font-weight:600;text-decoration:none;
}
.bottomnav-cta:hover{background:#fff}

/* hide legacy header / footer-info / carousel-dots in new layout */
.header, .footer-info, .carousel-dots[hidden]{display:none !important}

/* ─── DETAIL PAGE — adapt to cream palette ─── */
.detail-page{padding:2.5rem 2.4rem 12rem}
.detail-back{
  background:#1A1815;color:var(--accent);
  border:0.08rem solid var(--line);
  font-family:'Hanken Grotesk',system-ui,sans-serif;font-weight:500;
  font-size:0.9rem;letter-spacing:0;text-transform:none;
  padding:0.7rem 1.2rem;border-radius:999px;
}
.detail-back:hover{background:var(--accent);color:var(--bg);border-color:transparent}
.detail-back svg{width:1rem;height:1rem}
.detail-logo{display:flex;align-items:baseline;gap:0.5rem;color:var(--accent)}
.logo-svg-d{height:1.8rem;color:var(--accent)}
.detail-logo .sub{
  font-family:'Newsreader',serif;font-style:italic;font-weight:500;
  font-size:1.2rem;color:var(--accent);
}
.detail-kicker{
  font-family:'IBM Plex Mono',monospace;font-weight:500;
  font-size:0.85rem;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--accent-soft);opacity:1;
}
.manifesto{
  font-family:'Hanken Grotesk',system-ui,sans-serif;font-weight:500;
  font-size:5rem;line-height:1.05;letter-spacing:-0.03em;
  text-transform:none;color:var(--accent);
}
.manifesto em{
  font-family:'Newsreader',serif;font-style:italic;font-weight:500;
  letter-spacing:-0.01em;color:var(--cta);
}
.detail-lead{
  font-family:'Newsreader',serif;font-weight:400;font-style:normal;
  font-size:1.5rem;line-height:1.6;
  color:var(--accent);opacity:0.85;
}
.detail-lead strong{font-family:'Hanken Grotesk',sans-serif;font-weight:700;color:var(--accent)}
.detail-lead::first-letter{
  font-family:'Newsreader',serif;font-style:italic;font-weight:500;
  font-size:5rem;line-height:0.85;color:var(--cta);
  float:left;padding:0.3rem 1rem 0 0;
}
.section-title{
  font-family:'Hanken Grotesk',system-ui,sans-serif;font-weight:500;
  font-size:3.6rem;line-height:1.05;letter-spacing:-0.02em;
  text-transform:none;color:var(--accent);
}
.detail-section-label{
  font-family:'IBM Plex Mono',monospace;font-weight:500;
  font-size:0.85rem;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--accent-soft);opacity:1;
}
.agencies-track span{font-family:'Hanken Grotesk',sans-serif;font-weight:500;font-size:1.3rem;color:var(--accent)}
.agencies-track span::after{color:var(--cta);opacity:0.6}
.agencies{border-color:var(--line)}

/* ─── EDITORIAL 3-COLUMN WORK ROWS (poch-style) ─── */
.works-list{border-top:0.08rem solid var(--line)}
.work-row{
  display:grid;
  grid-template-columns:1fr 1.4fr 1.6fr;
  grid-template-rows:auto auto;
  gap:0 3rem;
  padding:2.5rem 0;
  border-bottom:0.08rem solid var(--line);
  cursor:pointer;position:relative;
  transition:background 0.25s ease;
}
.work-row::before{display:none}
.work-row:hover{padding-left:0;background:rgba(245,240,225,0.025)}
/* row 1: tags + see full case */
.work-row .work-tags-row{
  grid-column:1 / -1;
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:1.5rem;
}
.work-row .work-tags-row .work-tags{
  display:flex;flex-wrap:wrap;gap:0.4rem;
}
.work-row .work-tags-row .work-tags span{
  background:#1A1815;border:0;color:var(--accent);
  padding:0.3rem 0.85rem;border-radius:999px;
  font-family:'Hanken Grotesk',sans-serif;font-weight:500;
  font-size:0.78rem;letter-spacing:0;text-transform:none;
}
.work-row .work-see-full{
  font-family:'Hanken Grotesk',sans-serif;font-weight:500;
  font-size:0.85rem;color:var(--accent);text-decoration:none;
  display:inline-flex;align-items:center;gap:0.3rem;
  padding:0.4rem 0.9rem;border:0.08rem solid var(--line);border-radius:999px;
  transition:background 0.2s ease, color 0.2s ease;
}
.work-row:hover .work-see-full{background:var(--accent);color:var(--bg);border-color:transparent}
/* row 2: title (col 1) | preview (col 2) | description (col 3) */
.work-row .work-mid{
  grid-column:1;
  display:block;
  padding-right:1rem;
}
.work-row .work-title{
  font-family:'Hanken Grotesk',sans-serif;font-weight:600;
  font-size:1.9rem;line-height:1.2;letter-spacing:-0.02em;
  text-transform:none;color:var(--accent);
}
.work-row .work-title strong{font-weight:700;display:inline}
.work-row .work-title .caption{
  display:inline;
  font-family:'Hanken Grotesk',sans-serif;font-style:normal;font-weight:400;
  font-size:1.9rem;letter-spacing:-0.02em;color:var(--accent);
  opacity:1;margin-top:0;text-transform:none;
}
.work-row .work-meta{display:none}
.work-row .work-num{display:none}
.work-row .work-preview{
  grid-column:2;
  aspect-ratio:4/3;width:100%;
  background:#161310;border:0;border-radius:0.6rem;overflow:hidden;
}
.work-row .work-preview img{filter:saturate(1) contrast(1)}
.work-row:hover .work-preview img{transform:scale(1.04)}
.work-row .work-desc{
  grid-column:3;
  display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;
  font-family:'Hanken Grotesk',sans-serif;font-weight:400;
  font-size:0.95rem;line-height:1.55;color:var(--accent);
}
.work-row .work-desc p{margin:0}

/* image strip carousel below each project */
.work-row-strip{
  grid-column:1 / -1;
  display:flex;gap:0.6rem;margin-top:1.5rem;
  overflow-x:auto;scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
  padding-bottom:0.5rem;
}
.work-row-strip::-webkit-scrollbar{display:none}
.work-row-strip .strip-item{
  flex:0 0 28%;aspect-ratio:1/1;
  background:#161310;border-radius:0.4rem;overflow:hidden;
  scroll-snap-align:start;
}
.work-row-strip .strip-item img{width:100%;height:100%;object-fit:cover;display:block}

/* ─── COLLAB CTA ─── */
.collab-cta{
  margin-top:8rem;padding:6rem 0;
  border-top:0.08rem solid var(--line);border-bottom:0.08rem solid var(--line);
  text-align:center;
}
.collab-cta .collab-kicker{
  font-family:'IBM Plex Mono',monospace;font-weight:500;
  font-size:0.85rem;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--accent-soft);opacity:1;
}
.collab-cta .collab-title{
  font-family:'Hanken Grotesk',sans-serif;font-weight:500;
  font-size:6rem;line-height:1.05;letter-spacing:-0.025em;
  text-transform:none;color:var(--accent);
}
.collab-cta .collab-title em{
  font-family:'Newsreader',serif;font-style:italic;font-weight:500;
  letter-spacing:-0.01em;color:var(--cta);text-transform:none;
}
.collab-cta .collab-lead{
  font-family:'Hanken Grotesk',sans-serif;font-weight:400;
  color:var(--accent);opacity:0.85;
}
.collab-btn{
  background:var(--cta);color:#1A1815;
  font-family:'Hanken Grotesk',sans-serif;font-weight:600;
  font-size:1rem;letter-spacing:0;text-transform:none;
  padding:1rem 2rem;border-radius:999px;
}
.collab-btn:hover{background:#fff}

/* ─── PROJECT VIEW — adapt palette ─── */
.project-view{padding:2.5rem 2.4rem 12rem}
.project-hero .p-top{
  font-family:'IBM Plex Mono',monospace;font-weight:500;
  font-size:0.85rem;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--accent-soft);border-color:var(--line);
}
.project-hero .p-title{
  font-family:'Hanken Grotesk',sans-serif;font-weight:500;
  font-size:9rem;line-height:1.0;letter-spacing:-0.035em;
  text-transform:none;color:var(--accent);
}
.project-hero[data-num]::before{
  font-family:'Hanken Grotesk',sans-serif;font-weight:700;
  color:var(--accent);opacity:0.05;
}
.project-hero .p-meta-row{border-top:0.15rem solid var(--accent)}
.project-hero .p-caption{
  font-family:'Newsreader',serif;font-style:italic;font-weight:400;
  font-size:1.6rem;color:var(--accent);opacity:0.9;
}
.project-hero .p-tags span{
  background:#1A1815;border:0;color:var(--accent);
  padding:0.4rem 0.95rem;border-radius:999px;
  font-family:'Hanken Grotesk',sans-serif;font-weight:500;
  font-size:0.82rem;letter-spacing:0;text-transform:none;
}
.project-gallery .g-item{
  background:#161310;border:0;border-radius:0.6rem;overflow:hidden;
}
.project-nav-next{border-top:0.15rem solid var(--accent)}
.project-nav-next .pn-label{
  font-family:'IBM Plex Mono',monospace;font-weight:500;
  font-size:0.85rem;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--accent-soft);opacity:1;
}
.project-nav-next .pn-title{
  font-family:'Hanken Grotesk',sans-serif;font-weight:600;
  font-size:4.5rem;letter-spacing:-0.03em;text-transform:none;
  color:var(--accent);
}
.project-nav-next .pn-arrow{background:var(--cta);color:#1A1815}
.project-nav-next .pn-arrow:hover{background:#fff}

/* cursor — keep but in cream */
.cursor-ring{background:var(--accent) !important}
.cursor.hover .cursor-ring{background:var(--cta) !important}
.cursor.hover .cursor-label{color:#1A1815 !important}

/* mobile overrides for poch */
@media (max-width: 768px){
  body{padding-bottom:8rem}
  .topbar{padding:1.5rem 1.25rem;flex:0 0 auto}
  .hero{min-height:auto;padding:2rem 1.5rem 6rem;display:block}
  .hero .illustration{position:relative !important;height:auto !important;width:100% !important;opacity:1;margin:0 0 1.5rem;inset:auto !important;display:flex;justify-content:center}
  .hero .illustration svg{height:auto !important;max-height:30rem;width:auto;opacity:0.22}
  .hero .illustration .avatar3d{max-height:34rem;max-width:100%}
  .hero-line{font-size:2.4rem;line-height:1.15}
  .hero-line-sub{font-size:1.2rem}
  .hero-counter{position:relative;bottom:auto;left:auto;transform:none;margin-top:2rem;display:block}

  .bottomnav{bottom:1rem;flex-wrap:nowrap;max-width:calc(100% - 2rem);overflow-x:auto;scrollbar-width:none}
  .bottomnav::-webkit-scrollbar{display:none}
  .bottomnav-mark{width:2.6rem;height:2.6rem;padding:0.55rem;flex-shrink:0}
  .bottomnav-links{padding:0.3rem 0.4rem;gap:0.1rem;overflow-x:auto;scrollbar-width:none;flex-shrink:1;min-width:0}
  .bottomnav-links::-webkit-scrollbar{display:none}
  .bottomnav-links .nav-card{padding:0.45rem 0.85rem;font-size:0.85rem}
  .bottomnav-links .nav-card .c-title{font-size:0.85rem}
  .bottomnav-cta{padding:0.65rem 1rem;font-size:0.85rem;flex-shrink:0}

  .manifesto{font-size:3.5rem}
  .detail-lead{font-size:1.3rem}
  .detail-lead::first-letter{font-size:3.4rem}
  .section-title{font-size:2.6rem}
  .work-row{
    grid-template-columns:1fr;gap:1rem;padding:2rem 0;
  }
  .work-row .work-tags-row{margin-bottom:0.8rem;flex-wrap:wrap;gap:0.6rem}
  .work-row .work-mid,
  .work-row .work-preview,
  .work-row .work-desc{grid-column:1}
  .work-row .work-desc{grid-template-columns:1fr;gap:0.8rem}
  .work-row .work-title,
  .work-row .work-title .caption{font-size:1.4rem}
  .work-row-strip .strip-item{flex:0 0 65%}
  .project-view{padding:2rem 1.25rem 10rem}
  .project-hero .p-title{font-size:4rem}
  .collab-cta .collab-title{font-size:3.5rem}
  .project-nav-next .pn-title{font-size:2.6rem}
}
</style>
