<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAD Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,200;0,300;0,400;0,500;0,700;0,800;0,900;1,300;1,400&family=Newsreader:ital,wght@1,300;1,400;1,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html{
  font-size:clamp(4px, min(0.5208vw, 0.9259vh), 18px);
}
html,body{width:100%;height:100%;overflow:hidden}

:root{
  --bg: #0D0D0D;
  --accent: #FF313B;
  --dur: 0.45s;
}

body{
  font-family:'Roboto',sans-serif;
  background:var(--bg);
  color:var(--accent);
  display:grid;
  grid-template-rows:17rem 1fr 6rem 21.5rem;
  height:100vh;
  transition:background var(--dur) cubic-bezier(.4,0,.2,1), opacity 0.3s ease;
}
body.loading{opacity:0}
body.loading::after{
  content:'LOADING';
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono',monospace;font-weight:700;
  font-size:1.2rem;letter-spacing:0.3em;color:var(--accent);
  opacity:1;pointer-events:auto;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  padding:3rem 4.29rem 0;
}
.logo{
  display:flex;
  align-items:baseline;
  gap:0.6rem;
  color:var(--accent);
  transition:color var(--dur) ease;
}
.logo-svg{
  height:4.95rem;
  width:auto;
  color:var(--accent);
  transition:color var(--dur) ease;
  transform:translateY(0.6rem);
}
.logo-studio{
  font-family:'Newsreader',serif;
  font-style:italic;
  font-weight:400;
  font-size:3.32rem;
  line-height:1;
  color:var(--accent);
  transition:color var(--dur) ease;
}
.header-right{
  text-align:right;
  line-height:1.15;
}
.tagline{
  display:block;
  font-family:'Newsreader',serif;
  font-style:italic;
  font-weight:400;
  font-size:1.85rem;
  color:var(--accent);
  transition:color var(--dur) ease;
  margin-bottom:-0.2rem;
}
.website{
  font-family:'Roboto',sans-serif;
  font-weight:800;
  font-size:1.84rem;
  text-decoration:underline;
  color:var(--accent);
  transition:color var(--dur) ease;
}

/* HERO */
.hero{
  display:flex;
  align-items:center;
  padding:0 4.29rem;
  position:relative;
  overflow:visible;
}
.text-area{
  flex:0 0 60%;
  z-index:2;
}
.headline{
  font-family:'Roboto',sans-serif;
  font-weight:900;
  font-size:18.02rem;
  line-height:0.826;
  letter-spacing:-0.02em;
  text-transform:uppercase;
  color:var(--accent);
  white-space:pre-line;
  margin-bottom:3.7rem;
  transition:color var(--dur) ease, opacity .18s ease;
}
.subtitle{
  font-family:'Roboto',sans-serif;
  font-weight:400;
  font-size:2.9rem;
  line-height:1.4;
  color:var(--accent);
  transition:color var(--dur) ease, opacity .18s ease;
}
.subtitle em{
  font-family:'Newsreader',serif;
  font-style:italic;
  font-weight:500;
  font-size:3.9rem;
  line-height:1;
}

/* ILLUSTRATION */
.illustration{
  position:absolute;
  right:4.29rem;
  top:0;
  width:38%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:auto;
  cursor:pointer;
  overflow:visible;
}
.illustration:hover svg{transform:scale(1.04)}

/* ── CUSTOM CURSOR (solid dot + hover pill) ─── */
html, body, .illustration, .nav-card, a, button{cursor:none}
.cursor{
  position:fixed;
  top:0;left:0;
  width:1.65rem;height:1.65rem;
  pointer-events:none;
  z-index:9999;
  mix-blend-mode:difference;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:width 0.3s cubic-bezier(.2,.7,.2,1), height 0.3s cubic-bezier(.2,.7,.2,1), border-radius 0.3s cubic-bezier(.2,.7,.2,1);
}
/* solid filled dot */
.cursor-ring{
  position:absolute;
  inset:0;
  background:#fff;
  border-radius:50%;
  transition:background 0.25s ease, border-radius 0.3s cubic-bezier(.2,.7,.2,1);
}
/* label (hidden by default) */
.cursor-label{
  position:relative;
  font-family:'IBM Plex Mono',monospace;
  font-weight:700;
  font-size:1.95rem;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:#000;
  white-space:nowrap;
  opacity:0;
  transition:opacity 0.2s ease 0.1s;
  z-index:1;
}
/* hover state: morph into pill with label */
.cursor.hover{
  width:10.8rem;height:4.5rem;
  border-radius:2rem;
}
.cursor.hover .cursor-ring{
  border-radius:2rem;
  background:#fff;
}
.cursor.hover .cursor-label{opacity:1}
@media (hover: none){
  html, body, .illustration, .nav-card, a, button{cursor:auto}
  .cursor{display:none}
}

/* ── DETAIL PAGE OVERLAY ─── */
.detail-page{
  position:fixed;inset:0;
  background:var(--bg);
  color:var(--accent);
  z-index:500;
  opacity:0;visibility:hidden;
  pointer-events:none;
  transition:opacity 0.45s cubic-bezier(.2,.7,.2,1), visibility 0s linear 0.45s;
  overflow-y:auto;overflow-x:hidden;
  padding:3rem 4.29rem 6rem;
}
.detail-page.open{
  opacity:1;visibility:visible;pointer-events:auto;
  transition:opacity 0.45s cubic-bezier(.2,.7,.2,1), visibility 0s;
}
.detail-topbar{position:relative;height:0;pointer-events:none}
.detail-topbar > *{pointer-events:auto}
.detail-topbar .detail-back{position:fixed;top:3rem;left:4.29rem;z-index:30}
.detail-topbar .detail-logo{position:absolute;top:3rem;right:0}
.detail-back{
  display:inline-flex;align-items:center;gap:0.8rem;
  background:var(--bg);border:0.15rem solid var(--accent);
  color:var(--accent);
  font-family:'IBM Plex Mono',monospace;font-weight:700;
  font-size:1.1rem;letter-spacing:0.18em;text-transform:uppercase;
  padding:0.9rem 1.6rem;border-radius:2rem;
  cursor:pointer;
  transition:background 0.25s ease, color 0.25s ease, transform 0.25s ease;
}
.detail-back:hover{background:var(--accent);color:var(--bg);transform:translateX(-0.3rem)}
.detail-back svg{width:1.2rem;height:1.2rem}
.detail-logo{
  display:flex;align-items:baseline;gap:0.7rem;
  color:var(--accent);
}
.logo-svg-d{height:3.2rem;width:auto;color:var(--accent)}
.detail-logo .sub{
  font-family:'Newsreader',serif;font-style:italic;font-weight:500;
  font-size:2.2rem;letter-spacing:-0.01em;line-height:1;color:var(--accent);
}
.detail-inner{
  width:100%;margin:2rem 0 0;
}

/* manifesto hero */
.detail-hero{
  display:block;margin:4rem 0 8rem;min-height:40rem;
  display:flex;align-items:center;min-height:48rem;
}
.detail-hero .detail-copy{max-width:130rem}
.detail-kicker{
  font-family:'IBM Plex Mono',monospace;font-weight:700;
  font-size:1.3rem;letter-spacing:0.3em;text-transform:uppercase;
  margin-bottom:3rem;opacity:0.7;
}
.detail-kicker::before{content:'— '}
.manifesto{
  font-family:'Roboto',sans-serif;font-weight:900;
  font-size:12rem;line-height:0.92;letter-spacing:-0.03em;
  text-transform:uppercase;margin-bottom:3.5rem;
}
.manifesto em{
  font-family:'Newsreader',serif;font-style:italic;font-weight:500;
  letter-spacing:-0.01em;text-transform:none;
}
.detail-lead{
  font-family:'Roboto',sans-serif;font-weight:300;
  font-size:2.1rem;line-height:1.45;max-width:72rem;opacity:0.9;
}
.detail-lead strong{font-weight:700;font-style:normal}
.detail-illus{display:flex;align-items:center;justify-content:center}
.detail-illus svg{width:100%;max-width:56rem;height:auto}

/* agencies strip */
.agencies{
  display:flex;gap:0;margin:0 0 10rem;
  border-top:0.12rem solid var(--accent);border-bottom:0.12rem solid var(--accent);
  overflow:hidden;white-space:nowrap;
}
.agencies-track{
  display:flex;gap:5rem;padding:2.4rem 0;
  animation:agencyScroll 30s linear infinite;
}
.agencies-track span{
  font-family:'Roboto',sans-serif;font-weight:800;
  font-size:3rem;letter-spacing:-0.01em;text-transform:uppercase;
  display:inline-flex;align-items:center;gap:5rem;
}
.agencies-track span::after{content:'✦';font-weight:400;opacity:0.5}
@keyframes agencyScroll{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

/* works list */
.detail-section-label{
  font-family:'IBM Plex Mono',monospace;font-weight:700;
  font-size:1.3rem;letter-spacing:0.3em;text-transform:uppercase;
  margin-bottom:1.5rem;opacity:0.6;
}
.detail-section-label::before{content:'— '}
.section-title{
  font-family:'Roboto',sans-serif;font-weight:900;
  font-size:8rem;line-height:1;letter-spacing:-0.02em;
  text-transform:uppercase;margin-bottom:5rem;
}
.works-list{
  display:flex;flex-direction:column;
  border-top:0.1rem solid rgba(255,49,59,0.3);
}
.work-row{
  display:grid;grid-template-columns:5rem 1fr 38rem;
  gap:4rem;align-items:center;
  padding:3rem 0.5rem;
  border-bottom:0.1rem solid rgba(255,49,59,0.3);
  cursor:pointer;position:relative;
  transition:padding 0.35s cubic-bezier(.2,.7,.2,1);
}
.work-row:hover{padding-left:2.4rem}
.work-row::before{
  content:'';position:absolute;left:0;top:0;height:100%;width:0;
  background:var(--accent);opacity:0.08;
  transition:width 0.35s cubic-bezier(.2,.7,.2,1);
}
.work-row:hover::before{width:100%}
.work-num{
  font-family:'IBM Plex Mono',monospace;font-weight:700;
  font-size:1.3rem;letter-spacing:0.22em;opacity:0.6;
  position:relative;z-index:1;align-self:flex-start;padding-top:0.6rem;
}
.work-mid{position:relative;z-index:1;display:flex;flex-direction:column;gap:1.3rem}
.work-title{
  font-family:'Roboto',sans-serif;font-weight:800;
  font-size:4.2rem;line-height:1.02;letter-spacing:-0.02em;
  text-transform:uppercase;
}
.work-title .caption{
  display:block;font-family:'Newsreader',serif;font-style:italic;
  font-weight:400;font-size:1.6rem;letter-spacing:0;opacity:0.7;
  margin-top:0.7rem;text-transform:none;
}
.work-meta{
  display:flex;align-items:center;gap:1.4rem;flex-wrap:wrap;
  font-family:'IBM Plex Mono',monospace;font-weight:500;
  font-size:1.05rem;letter-spacing:0.18em;text-transform:uppercase;
}
.work-year{opacity:0.7;padding-right:0.6rem;border-right:0.08rem solid rgba(255,49,59,0.4)}
.work-tags{display:flex;flex-wrap:wrap;gap:0.55rem;opacity:0.85}
.work-tags span{
  border:0.08rem solid var(--accent);
  padding:0.4rem 0.85rem;border-radius:1rem;
}
.work-preview{
  position:relative;z-index:1;
  aspect-ratio:16/9;width:100%;
  background:#1a1a1a;overflow:hidden;
  border:0.1rem solid rgba(255,49,59,0.3);
  transition:transform 0.35s cubic-bezier(.2,.7,.2,1), border-color 0.3s ease;
}
.work-preview img{
  width:100%;height:100%;object-fit:cover;
  transform:scale(1.02);
  transition:transform 0.6s cubic-bezier(.2,.7,.2,1), filter 0.3s ease;
  filter:saturate(0.9) contrast(1.05);
}
.work-row:hover .work-preview{border-color:var(--accent)}
.work-row:hover .work-preview img{transform:scale(1.08);filter:saturate(1) contrast(1.1)}

/* ── PROJECT DETAIL (inside a work) ─── */
.project-view{
  position:fixed;inset:0;z-index:700;
  background:var(--bg);color:var(--accent);
  overflow-y:auto;overflow-x:hidden;
  opacity:0;visibility:hidden;pointer-events:none;
  transform:translateY(100%);
  transition:opacity 0.55s cubic-bezier(.2,.7,.2,1), transform 0.7s cubic-bezier(.2,.7,.2,1), visibility 0s linear 0.7s;
  padding:3rem 4.29rem 0;
}
.project-view.open{
  opacity:1;visibility:visible;pointer-events:auto;transform:translateY(0);
  transition:opacity 0.55s cubic-bezier(.2,.7,.2,1), transform 0.7s cubic-bezier(.2,.7,.2,1), visibility 0s;
}
.project-view .detail-topbar{margin-bottom:2rem}

/* project hero — editorial magazine opener */
.project-hero{margin:6rem 0 4rem}
.project-hero .p-top{
  display:flex;justify-content:space-between;align-items:baseline;
  padding-bottom:1.5rem;border-bottom:0.1rem solid rgba(255,49,59,0.35);
  font-family:'IBM Plex Mono',monospace;font-weight:700;
  font-size:1.3rem;letter-spacing:0.28em;text-transform:uppercase;
}
.project-hero .p-index{opacity:0.7}
.project-hero .p-year-top{opacity:0.9}
.project-hero .p-title{
  font-family:'Roboto',sans-serif;font-weight:900;
  font-size:18rem;line-height:0.88;letter-spacing:-0.035em;
  text-transform:uppercase;margin:4rem 0 3rem;
}
.project-hero .p-meta-row{
  display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start;
  padding-top:2.5rem;border-top:0.25rem solid var(--accent);
}
.project-hero .p-caption{
  font-family:'Newsreader',serif;font-style:italic;font-weight:400;
  font-size:2.4rem;line-height:1.3;opacity:0.95;max-width:60rem;
}
.project-hero .p-tags{
  display:flex;flex-wrap:wrap;gap:0.7rem;justify-content:flex-end;
  font-family:'IBM Plex Mono',monospace;font-weight:500;
  font-size:1.05rem;letter-spacing:0.22em;text-transform:uppercase;
}
.project-hero .p-tags span{border:0.1rem solid var(--accent);padding:0.55rem 1.1rem;border-radius:1.4rem;opacity:0.85}

.project-gallery{display:flex;flex-direction:column;gap:2rem;margin-top:2rem}
.project-gallery .g-item{width:100%;background:#1a1a1a;overflow:hidden;border:0.1rem solid rgba(255,49,59,0.2)}
.project-gallery .g-item img{width:100%;height:auto;display:block}
.project-nav-next{
  margin:10rem 0 0;padding:5rem 0 6rem;
  display:flex;justify-content:space-between;align-items:center;
  border-top:0.2rem solid var(--accent);
}
.project-nav-next .pn-block{max-width:80%}
.project-nav-next .pn-label{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:1.15rem;letter-spacing:0.3em;opacity:0.6;text-transform:uppercase}
.project-nav-next .pn-title{font-family:'Roboto',sans-serif;font-weight:900;font-size:7rem;line-height:0.95;letter-spacing:-0.025em;text-transform:uppercase;margin-top:1rem;cursor:pointer;transition:opacity 0.25s ease, transform 0.35s cubic-bezier(.2,.7,.2,1);display:inline-block}
.project-nav-next .pn-title:hover{opacity:0.75;transform:translateX(0.6rem)}
.project-nav-next .pn-arrow{
  width:6rem;height:6rem;border-radius:50%;flex-shrink:0;
  background:var(--accent);color:var(--bg);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:transform 0.35s cubic-bezier(.2,.7,.2,1);
}
.project-nav-next .pn-arrow:hover{transform:scale(1.1) translateX(0.4rem)}
.project-nav-next .pn-arrow svg{width:2.2rem;height:2.2rem}

/* project view entrance animations */
@keyframes projFadeUp{from{opacity:0;transform:translateY(2rem)}to{opacity:1;transform:translateY(0)}}
.project-view.open .p-top{animation:projFadeUp 0.5s 0.15s cubic-bezier(.2,.7,.2,1) both}
.project-view.open .p-title{animation:detailGlitchIn 0.8s 0.2s cubic-bezier(.2,.7,.2,1) both}
.project-view.open .p-meta-row{animation:projFadeUp 0.55s 0.45s cubic-bezier(.2,.7,.2,1) both}
.project-view.open .project-gallery .g-item{animation:projFadeUp 0.5s calc(0.55s + var(--gi,0) * 0.06s) cubic-bezier(.2,.7,.2,1) both}

/* Footer CTA */
.collab-cta{
  margin-top:10rem;padding:6rem 0;
  border-top:0.12rem solid var(--accent);border-bottom:0.12rem solid var(--accent);
  text-align:center;
}
.collab-cta .collab-kicker{
  font-family:'IBM Plex Mono',monospace;font-weight:700;
  font-size:1.05rem;letter-spacing:0.3em;text-transform:uppercase;
  margin-bottom:2rem;opacity:0.7;
}
.collab-cta .collab-title{
  font-family:'Roboto',sans-serif;font-weight:900;
  font-size:9rem;line-height:0.9;letter-spacing:-0.03em;
  text-transform:uppercase;margin-bottom:2rem;
}
.collab-cta .collab-title em{
  font-family:'Newsreader',serif;font-style:italic;font-weight:500;
  text-transform:none;letter-spacing:-0.01em;
}
.collab-cta .collab-lead{
  font-family:'Roboto',sans-serif;font-weight:300;font-size:1.6rem;
  max-width:60rem;margin:0 auto 3rem;line-height:1.5;opacity:0.85;
}
.collab-btn{
  display:inline-flex;align-items:center;gap:1rem;
  background:var(--accent);color:var(--bg);
  font-family:'IBM Plex Mono',monospace;font-weight:700;
  font-size:1.2rem;letter-spacing:0.2em;text-transform:uppercase;
  padding:1.4rem 2.8rem;border-radius:3rem;text-decoration:none;
  transition:transform 0.25s ease, background 0.25s ease;
}
.collab-btn:hover{transform:scale(1.04) translateY(-0.2rem)}

/* entrance anim for detail */
@keyframes detailGlitchIn{
  0%{opacity:0;transform:translateX(2rem) skewX(6deg);text-shadow:0.8rem 0 rgba(255,49,59,0.9),-0.8rem 0 rgba(0,255,255,0.6)}
  40%{opacity:1;transform:translateX(-0.6rem) skewX(-3deg);text-shadow:-0.4rem 0 rgba(255,49,59,0.7),0.4rem 0 rgba(0,255,255,0.4)}
  100%{opacity:1;transform:translateX(0) skewX(0);text-shadow:none}
}
@keyframes detailFadeUp{
  from{opacity:0;transform:translateY(2rem)}
  to{opacity:1;transform:translateY(0)}
}
.detail-page.open .manifesto{animation:detailGlitchIn 0.8s cubic-bezier(.2,.7,.2,1) both}
.detail-page.open .detail-kicker{animation:detailFadeUp 0.5s 0.1s cubic-bezier(.2,.7,.2,1) both}
.detail-page.open .detail-lead{animation:detailFadeUp 0.6s 0.3s cubic-bezier(.2,.7,.2,1) both}
.detail-page.open .detail-illus{animation:detailFadeUp 0.7s 0.4s cubic-bezier(.2,.7,.2,1) both}
.illustration svg{
  height:144%;
  max-height:none;
  width:auto;
  flex-shrink:0;
  color:var(--accent);
  transition:color var(--dur) ease, opacity .18s ease;
}
.illustration[data-id="vision"] svg{
  translate:-10% 0;
}
.illustration[data-id="originals"] svg{
  translate:-7% 0;
}

/* FOOTER INFO */
.footer-info{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  padding:0 4.29rem;
  transform:translateY(3rem);
  color:var(--accent);
  transition:color var(--dur) ease;
}
.pick-label{
  display:block;
  font-family:'Newsreader',serif;
  font-style:italic;
  font-weight:300;
  font-size:1.88rem;
  margin-bottom:0.3rem;
}
.pick-label::before{
  content:'— ';
  font-family:'Roboto',sans-serif;
  font-style:normal;
  font-weight:500;
}
.counter-num{
  display:block;
  font-family:'Roboto',sans-serif;
  font-weight:200;
  font-size:2.6rem;
  transition:color var(--dur) ease;
}
.counter-num .counter-section{
  font-weight:500;
}
.click-hint{
  font-family:'Newsreader',serif;
  font-style:italic;
  font-weight:500;
  font-size:1.6rem;
}

/* NAV CARDS */
.nav-cards{
  display:flex;
  padding:2.2rem 4.29rem 9rem;
  transform:translateY(3rem);
  gap:1.61rem;
  align-items:stretch;
  height:100%;
}
.nav-card{
  flex:1;
  padding:0 2.2rem;
  cursor:pointer;
  border:0.2rem solid transparent;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:1.4rem;
  transition:transform 0.22s ease, background var(--dur) ease, border-color var(--dur) ease, color var(--dur) ease;
  user-select:none;
  overflow:hidden;
  min-height:11.85rem;
  max-height:11.85rem;
  position:relative;
}
.nav-card:hover{transform:translateY(-0.3rem)}
.nav-card .c-num,
.nav-card .c-title,
.nav-card .c-sub,
.nav-card .c-icon{
  color:inherit;
  transition:color var(--dur) ease;
}
.nav-card.active{border-width:0.2rem}

.c-info{flex:1;min-width:0;position:relative;z-index:2}
.c-num{
  font-family:'Roboto',sans-serif;
  font-size:1.42rem;
  font-weight:400;
  letter-spacing:0.02em;
  display:block;
  margin-bottom:0.6rem;
}
.c-title{
  font-family:'Roboto',sans-serif;
  font-weight:800;
  font-size:2.83rem;
  letter-spacing:0;
  display:block;
  white-space:nowrap;
  line-height:1;
}
.c-sub{
  font-family:'Newsreader',serif;
  font-style:italic;
  font-weight:400;
  font-size:1.5rem;
  display:block;
  line-height:1.2;
  margin-top:0.5rem;
}

.c-icon{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:1;
}
.c-icon svg{
  width:100%;
  height:100%;
  display:block;
  overflow:visible;
}

.fading{opacity:0 !important}

/* Card hover */
.nav-card{transition:background var(--dur) ease, border-color var(--dur) ease, color var(--dur) ease}

/* ── HEADLINE GLITCH-IN (switch only) ─────────────────── */
@keyframes glitchIn{
  0%{opacity:0;transform:translateX(1.8rem) skewX(8deg);text-shadow:0.6rem 0 rgba(255,49,59,0.9),-0.6rem 0 rgba(0,255,255,0.6)}
  30%{opacity:1;transform:translateX(-0.6rem) skewX(-5deg);text-shadow:-0.5rem 0 rgba(255,49,59,0.9),0.5rem 0 rgba(0,255,255,0.6)}
  55%{transform:translateX(0.4rem) skewX(3deg);text-shadow:0.3rem 0 rgba(255,49,59,0.7),-0.3rem 0 rgba(0,255,255,0.4)}
  80%{transform:translateX(-0.15rem) skewX(-1deg);text-shadow:-0.15rem 0 rgba(255,49,59,0.5),0.15rem 0 rgba(0,255,255,0.3)}
  100%{opacity:1;transform:translateX(0) skewX(0);text-shadow:none}
}
.switching .headline{animation:glitchIn 0.6s cubic-bezier(.2,.7,.2,1) both}

@keyframes illusGlitchPop{
  0%{filter:drop-shadow(0.6rem 0 rgba(255,49,59,0.85)) drop-shadow(-0.6rem 0 rgba(0,255,255,0.6))}
  40%{filter:drop-shadow(-0.5rem 0 rgba(255,49,59,0.85)) drop-shadow(0.5rem 0 rgba(0,255,255,0.6))}
  70%{filter:drop-shadow(0.25rem 0 rgba(255,49,59,0.55)) drop-shadow(-0.25rem 0 rgba(0,255,255,0.35))}
  100%{filter:drop-shadow(0 0 0 transparent)}
}
.illustration svg{transform-origin:center center}
.switching .illustration svg{animation:illusGlitchPop 0.7s cubic-bezier(.2,.7,.2,1) both}

@keyframes subFadeUp{
  from{opacity:0;transform:translateY(1.2rem)}
  to{opacity:1;transform:translateY(0)}
}
.switching .subtitle{animation:subFadeUp 0.55s 0.15s cubic-bezier(.2,.7,.2,1) both}

@keyframes flashBurst{
  0%,100%{opacity:0}
  8%{opacity:0.4}
  30%{opacity:0}
}
body::after{content:'';position:fixed;inset:0;background:var(--accent);opacity:0;pointer-events:none;z-index:999;mix-blend-mode:difference}
body.switching::after{animation:flashBurst 0.45s ease-out}

@keyframes invertFlash{
  0%,100%{filter:none}
  10%{filter:invert(1) hue-rotate(180deg)}
  25%{filter:invert(1) hue-rotate(180deg)}
  40%{filter:none}
}
body.switching{animation:invertFlash 0.5s ease-out}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none !important;transition:none !important}
}

/* ═══════════════════════════════════════════════════════
   MOBILE — responsive layout (≤768px)
   ═══════════════════════════════════════════════════════ */
@media (max-width: 768px){
  html{font-size:10px}

    transform:none;
  }
  .illustration svg{
    height:100% !important;max-height:none;width:auto;

  .nav-card{

    position:relative;overflow:hidden;
    border-width:0.15rem;
  }
  .nav-card:hover{transform:none}
  .nav-card .c-info{
    display:flex;flex-direction:column;gap:0.35rem;
    position:relative;z-index:2;
  }
  .nav-card .c-num{font-size:0.9rem;letter-spacing:0.22em}

  /* dots indicator */
  .carousel-dots{

  }
  .carousel-dots .dot.active{opacity:1;transform:scale(1.4)}

  /* CUSTOM CURSOR — hide on touch (already via hover:none, belt+braces) */
  .cursor{display:none !important}
  html, body, .illustration, .nav-card, a, button{cursor:auto}

  /* ─── DETAIL PAGE ─── */
  .detail-page{padding:1.5rem 1.25rem 3rem}

  .agencies{margin:0 0 5rem}

  /* works list section */
  .detail-section-label{font-size:1rem;margin-bottom:1rem}

  /* works rows — stack image on top */
  .work-row{
    display:flex;flex-direction:column;gap:1.2rem;

  }
  .work-row:hover{padding-left:0.2rem}
  .work-num{font-size:0.9rem;padding:0;opacity:0.6}

}

/* extra-small phones (<380px) */

}
